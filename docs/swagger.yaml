info:
  contact: {}
  description: gopet rest api schema
  title: Golang GOPET API
  version: "1.0"
paths:
  /statistics:
    get:
      description: 'Get statistics with optional filters such as: user if/time gap'
      parameters:
      - description: user id filtration
        in: query
        name: user_id
        type: integer
      - description: time scinse starting to analyse statistics
        in: query
        name: from
        type: string
      - description: 'time till analyse statistics '
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully got statistics
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.GetStatisticsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
      summary: Get Statistics
      tags:
      - statistics
  /tasks:
    get:
      description: Get tasks in system
      parameters:
      - description: Filtraion by user id
        in: query
        name: user_id
        type: string
      - description: Pagination limit parameter
        in: query
        name: limit
        type: integer
      - description: Pagination offset parameter
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved tasks
          schema:
            items:
              $ref: '#/definitions/internal_features_tasks_transport_http.TaskDTOResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
      summary: Get task
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Create new task in system
      parameters:
      - description: CreateTask request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully created task
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "404":
          description: Author not found
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
      summary: Create task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      description: Delete task in system
      parameters:
      - description: ID of the task to be deleted
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Successfully deleted task
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
      summary: Delete task
      tags:
      - tasks
    get:
      description: Get task in system
      parameters:
      - description: ID of the task to be retrieved
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved task
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.GetTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
      summary: Get task
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: |-
        Get tasks in system
        ### Three-state logic:
        1. **Field is not provided:** nothing to be done
        2. **Field is provided("go for a walk"):** redact
        3. **Field is provided(null):** set to null
      parameters:
      - description: ID of the task to be patched
        in: path
        name: id
        required: true
        type: integer
      - description: request body of PatchTask
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.PatchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully patched task
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.PatchUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gopet_internal_core_transport_response.ErorrResponse'
      summary: Patch task
      tags:
      - tasks
