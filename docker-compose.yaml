services:
  gopet:
    build: 
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/gopet/Dockerfile
    container_name: gopet
    environment:
      - HTTP_ADDR=:5050
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - POSTGRES_HOST=gopet-postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FOLDER=/app/out/logs  
      - TIME_ZONE=${TIME_ZONE}
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: always

  gopet-postgres:
    image: postgres:18.1-bookworm
    container_name: gopet-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=-A md5 
    volumes:
        - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  gopet-migrate:
    image: migrate/migrate:v4.19.1
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
       - ${PROJECT_ROOT}/migrations:/migrations
  gopet-socat:
    image: alpine/socat:1.8.0.3
    ports:
     - "127.0.0.1:5432:5432"
    container_name: gopet-env-socat
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:gopet-env-postgres:5432
  swagger:
    build: 
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.25.0-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}:/code